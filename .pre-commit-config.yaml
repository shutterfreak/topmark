repos:
  # Fast generic checks first
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        # Allow custom YAML tags often used in MkDocs (PyYAML python/name tags)
        args: [--unsafe]
      - id: check-added-large-files

  # Formatters
  - repo: https://github.com/ComPWA/mirrors-taplo
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        # Use args to point to your config or ignore specific folders
        args: ["--config", ".markdownlint.jsonc"]

  # Use local lychee setup to overcome the 'nightly' release tag problem in autoupdate
  - repo: local
    hooks:
      - id: lychee-md
        name: lychee (changed Markdown)
        entry: lychee
        language: system
        args: ["--config", "lychee.toml", "--no-progress"]
        files: ^(README\.md|docs/).*\.(md|MD)$
        pass_filenames: true

      - id: lychee-site
        name: lychee (MkDocs site, incl. generated pages)
        entry: make
        language: system
        args: ["links-site"]
        pass_filenames: false
        stages: [manual]

      - id: lychee-src
        name: lychee (changed Python docstrings)
        entry: lychee
        language: system
        args: ["--config", "lychee.toml", "--no-progress"]
        files: ^src/.*\.py$
        pass_filenames: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
      - id: ruff-check

  # Project-specific header checker (after formatters)
  - repo: https://github.com/shutterfreak/topmark
    rev: v1.0.1
    hooks:
      - id: topmark-check
        # files: '\.(py|md|toml|ya?ml|sh|Makefile)$'

      - id: topmark-apply
        # files: '\.(py|md|toml|ya?ml|sh|Makefile)$'

      - id: topmark-probe

  # Docstring semantics for source and tooling modules
  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.7
    hooks:
      - id: pydoclint
        args: ["-q"]
        files: ^(src|tools)/.*\.py$

  # Project-specific hygiene checks that mirror lightweight Nox sessions
  - repo: local
    hooks:
      - id: code-hygiene
        # Repository-wide check; the file filter only decides when the hook runs.
        name: code hygiene (TopMark)
        entry: python
        language: system
        args: ["tools/docs/check_code_hygiene.py"]
        files: ^(src|tests|tools)/.*\.py$
        pass_filenames: false

      # Repository-wide docs check; snippets and cross-file rules need full context.
      - id: docs-hygiene
        name: docs hygiene (TopMark)
        entry: python
        language: python
        additional_dependencies: ["rich>=15.0.0,<16.0.0"]
        args: ["tools/docs/check_docs_hygiene.py", "--docs-hygiene", "--stats"]
        files: ^(README\.md|CHANGELOG\.md|CONTRIBUTING\.md|INSTALL\.md|docs/.*\.md)$
        pass_filenames: false

      - id: docstring-links
        # File-oriented check; changed source files are passed to the script.
        name: docstring link style (TopMark)
        entry: python
        language: python
        additional_dependencies: ["rich>=15.0.0,<16.0.0"]
        args: ["tools/docs/check_docs_hygiene.py"]
        files: ^src/.*\.py$
        pass_filenames: true

  # TOML lint (after TOML format)
  - repo: https://github.com/ComPWA/mirrors-taplo
    rev: v0.9.3
    hooks:
      - id: taplo-lint
        args: ["--no-schema"]

  # Type checker last
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.411
    hooks:
      - id: pyright

  # Makefile linting and formatting
  - repo: https://github.com/EbodShojaei/bake
    rev: v1.4.6
    hooks:
      - id: mbake-format
        # files: (^|/)(M|m)akefile$|GNUMakefile$|\.mak$

      - id: mbake-validate
        # files: (^|/)(M|m)akefile$|GNUMakefile$|\.mak$
