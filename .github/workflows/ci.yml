name: CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "docs/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".bake.toml"
      - ".mdformat.toml"
      - ".taplo.toml"
      - "Makefile"
      - "mkdocs.yml"
      - "mkdocs.linkcheck.yml"
      - ".readthedocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "noxfile.py"
      - "README.md"
      - "INSTALL.md"
      - "CONTRIBUTING.md"
      - "lychee.toml"
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  changes:
    name: Detect changed file groups
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      docs_changed: ${{ steps.filter.outputs.docs }}
      markdown_links_changed: ${{ steps.filter.outputs.markdown_links }}
      precommit_changed: ${{ steps.filter.outputs.precommit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - '.github/actions/setup-python-nox/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
            docs:
              - 'docs/**'
              - 'src/**'
              - 'tools/docs/**'
              - '.github/actions/setup-python-nox/**'
              - '.mdformat.toml'
              - 'mkdocs.yml'
              - 'mkdocs.linkcheck.yml'
              - '.readthedocs.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
            markdown_links:
              - 'docs/**'
              - 'tools/docs/**'
              - 'README.md'
              - 'INSTALL.md'
              - 'CONTRIBUTING.md'
              - 'lychee.toml'
            precommit:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'docs/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.pre-commit-config.yaml'
              - '.bake.toml'
              - '.mdformat.toml'
              - '.taplo.toml'
              - 'Makefile'
              - 'mkdocs.yml'
              - 'mkdocs.linkcheck.yml'
              - '.readthedocs.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
              - 'README.md'
              - 'INSTALL.md'
              - 'CONTRIBUTING.md'

      - run: echo "python_changed=${{ steps.filter.outputs.python }}"
      - run: echo "docs_changed=${{ steps.filter.outputs.docs }}"
      - run: echo "markdown_links_changed=${{ steps.filter.outputs.markdown_links }}"
      - run: echo "precommit_changed=${{ steps.filter.outputs.precommit }}"

  lint:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Lint & type-check via nox
        run: |
          nox -s format_check
          nox -s lint
          nox -s docstring_links

  pre-commit:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.precommit_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.x"

      - name: Cache uv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install pre-commit
        run: |
          uv pip install --system pre-commit

      - name: Run pre-commit hooks
        env:
          SKIP: lychee-md,lychee-src,pyright,docstring-ref-links
        run: pre-commit run --all-files --show-diff-on-failure

  docs:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Build docs (strict via nox)
        run: |
          nox -s docs

  tests:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.x"

      - name: Cache uv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'noxfile.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Bootstrap nox
        run: |
          uv pip install --system nox nox-uv

      - name: Run nox QA for ${{ matrix.python-version }}
        run: |
          nox -s qa -p ${{ matrix.python-version }}

  api-snapshot:
    name: API Snapshot
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Run API snapshot check (py313)
        run: |
          nox -s api_snapshot -p 3.13

  links:
    # Use official lychee Action; no cargo needed
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.markdown_links_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check links in docs and selected top-level Markdown
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --config lychee.toml
            --no-progress
            --quiet
            docs
            README.md
            INSTALL.md
            CONTRIBUTING.md

  links-site:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Install docs requirements
        run: |
          uv pip install --system -e .[docs]

      - name: Build docs (linkcheck config)
        run: |
          mkdocs build -f mkdocs.linkcheck.yml --strict

      - name: Check links in built site
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --config lychee.toml
            --no-progress
            --quiet
            --root-dir ${{ github.workspace }}/site
            site
