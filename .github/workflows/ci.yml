name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "docs/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".bake.toml"
      - ".mdformat.toml"
      - ".taplo.toml"
      - "Makefile"
      - "mkdocs.yml"
      - "mkdocs.linkcheck.yml"
      - ".readthedocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "noxfile.py"
      - "README.md"
      - "INSTALL.md"
      - "CONTRIBUTING.md"
      - "lychee.toml"
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  changes:
    name: Detect changed file groups
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      docs_changed: ${{ steps.filter.outputs.docs }}
      markdown_links_changed: ${{ steps.filter.outputs.markdown_links }}
      precommit_changed: ${{ steps.filter.outputs.precommit }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - '.github/actions/setup-python-nox/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
            docs:
              - 'docs/**'
              - 'src/**'
              - 'tools/docs/**'
              - '.github/actions/setup-python-nox/**'
              - '.mdformat.toml'
              - 'mkdocs.yml'
              - 'mkdocs.linkcheck.yml'
              - '.readthedocs.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
            markdown_links:
              - 'docs/**'
              - 'tools/docs/**'
              - 'README.md'
              - 'INSTALL.md'
              - 'CONTRIBUTING.md'
              - 'lychee.toml'
            precommit:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'docs/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.pre-commit-config.yaml'
              - '.bake.toml'
              - '.mdformat.toml'
              - '.taplo.toml'
              - 'Makefile'
              - 'mkdocs.yml'
              - 'mkdocs.linkcheck.yml'
              - '.readthedocs.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
              - 'README.md'
              - 'INSTALL.md'
              - 'CONTRIBUTING.md'
      - name: Report changed file groups
        shell: bash
        run: |
          {
            echo "## Changed file groups"
            echo
            echo "| Group          | Changed                                    |"
            echo "| -------------- | ------------------------------------------ |"
            echo "| Python         | ${{ steps.filter.outputs.python }}         |"
            echo "| Documentation  | ${{ steps.filter.outputs.docs }}           |"
            echo "| Markdown links | ${{ steps.filter.outputs.markdown_links }} |"
            echo "| Pre-commit     | ${{ steps.filter.outputs.precommit }}      |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "python_changed=${{ steps.filter.outputs.python }}"
          echo "docs_changed=${{ steps.filter.outputs.docs }}"
          echo "markdown_links_changed=${{ steps.filter.outputs.markdown_links }}"
          echo "precommit_changed=${{ steps.filter.outputs.precommit }}"

  python-metadata:
    name: Resolve Python metadata
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      supported: ${{ steps.python-matrix.outputs.supported }}
      canonical: ${{ steps.python-matrix.outputs.canonical }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.x"

      - id: python-matrix
        name: Resolve supported Python matrix
        shell: bash
        run: |
          set -euo pipefail
          MATRIX_JSON="$(nox -s print_python_matrix)"
          MATRIX_JSON="$MATRIX_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          payload = json.loads(os.environ["MATRIX_JSON"])
          supported = payload["supported"]
          canonical = payload["canonical"]

          if not isinstance(supported, list) or not supported:
              raise SystemExit("Supported Python metadata must be a non-empty JSON list")
          if not all(isinstance(version, str) for version in supported):
              raise SystemExit("Supported Python metadata must contain only strings")
          if not isinstance(canonical, str) or not canonical:
              raise SystemExit("Canonical Python metadata must be a non-empty string")

          print(f"supported={json.dumps(supported, separators=(',', ':'))}")
          print(f"canonical={canonical}")
          PY

  lint:
    name: Lint
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Lint & type-check via nox
        run: |
          nox -s format_check
          nox -s lint
          nox -s docstring_links

  pre-commit:
    name: Pre-commit
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.precommit_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.x"
          enable-cache: false

      - name: Cache uv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install pre-commit
        run: |
          uv pip install --system pre-commit

      - name: Run pre-commit hooks
        env:
          SKIP: lychee-md,lychee-src,pyright,docstring-ref-links
        run: pre-commit run --all-files --show-diff-on-failure

  docs:
    name: Docs
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Build docs (strict via nox)
        run: |
          nox -s docs

  # Build release artifacts in unprivileged CI so privileged release workflow can publish without checking out/building repo code.
  release-artifacts:
    name: Build release artifacts
    needs: [changes, python-metadata, lint, pre-commit, docs, tests, filesystem-tests, coverage, links, links-site]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Build artifacts
        run: |
          uv build

      - name: Install packaging
        run: |
          uv pip install --system packaging

      - name: Collect release metadata
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-meta
          TAG="$REF_NAME"
          TAG_NO_V="${TAG#v}"
          VERSION_PEP440=$(TAG_NO_V="$TAG_NO_V" python - <<-'PY'
          from os import environ
          from packaging.version import Version

          print(Version(environ["TAG_NO_V"]))
          PY
          )
          printf '%s\n' "$TAG" > release-meta/tag.txt
          printf '%s\n' "$TAG_NO_V" > release-meta/tag_no_v.txt
          printf '%s\n' "$VERSION_PEP440" > release-meta/version_pep440.txt
          printf '%s\n' '${{ needs.python-metadata.outputs.canonical }}' > release-meta/python_canonical.txt
          printf '%s\n' '${{ needs.python-metadata.outputs.supported }}' > release-meta/python_supported.json
          sha256sum dist/* > release-meta/SHA256SUMS

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: topmark-dist
          path: dist/*
          if-no-files-found: error

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: topmark-release-meta
          path: release-meta/*
          if-no-files-found: error

  tests:
    name: Tests (${{ matrix.python-version }})
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.python-metadata.outputs.supported) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.x"
          enable-cache: false

      - name: Cache uv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'noxfile.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Bootstrap nox
        run: |
          uv pip install --system nox nox-uv

      - name: Run nox QA for ${{ matrix.python-version }}
        run: |
          nox -s qa -p ${{ matrix.python-version }}

  filesystem-tests:
    name: Filesystem tests (${{ matrix.os }})
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Run canonical Python QA on ${{ matrix.os }}
        env:
          TOPMARK_REQUIRE_SYMLINKS: "1"
        run: |
          nox -s qa -p ${{ needs.python-metadata.outputs.canonical }}

  coverage:
    name: Coverage
    needs: [changes, python-metadata, tests]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Run coverage session
        run: |
          nox -s coverage -p ${{ needs.python-metadata.outputs.canonical }}

      - name: Publish coverage summary
        shell: bash
        run: |
          cat > coverage_summary.py <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          totals = data["totals"]

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as f:
              f.write("## Coverage\n\n")
              f.write(f"- Coverage: {totals['percent_covered_display']}%\n")
              f.write(f"- Covered lines: {totals['covered_lines']}\n")
              f.write(f"- Total statements: {totals['num_statements']}\n")
              f.write("\n> [!NOTE]\n> Detailed HTML/XML/JSON reports are available as workflow artifacts.\n")
          PY
          python coverage_summary.py

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: error

      - name: Upload coverage machine reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: error

  api-snapshot:
    name: API Snapshot
    needs: [changes, python-metadata]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.python_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Run API snapshot check
        run: |
          nox -s api_snapshot -p ${{ needs.python-metadata.outputs.canonical }}

  links:
    name: Source link check
    # Use official lychee Action; no cargo needed
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.markdown_links_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check links in docs and selected top-level Markdown
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --config lychee.toml --no-progress --quiet docs README.md INSTALL.md CONTRIBUTING.md

  links-site:
    name: Site link check
    needs: [changes, python-metadata]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: ${{ needs.python-metadata.outputs.canonical }}

      - name: Install docs requirements
        run: |
          uv pip install --system -e .[docs]

      - name: Build docs (linkcheck config)
        run: |
          mkdocs build -f mkdocs.linkcheck.yml --strict

      - name: Check links in built site
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --config lychee.toml --no-progress --quiet --root-dir ${{ github.workspace }}/site site
