name: CI

on:
    pull_request:
        paths:
            - "src/**"
            - "tests/**"
            - "tools/**"
            - "docs/**"
            - ".github/workflows/**"
            - ".github/actions/**"
            - ".pre-commit-config.yaml"
            - ".bake.toml"
            - "Makefile"
            - "mkdocs.yml"
            - "mkdocs.linkcheck.yml"
            - "pyproject.toml"
            - "noxfile.py"
            - "requirements*.txt"
            - "constraints*.txt"
            - "README.md"
            - "INSTALL.md"
            - "CONTRIBUTING.md"
            - "lychee.toml"
    push:
        branches: [main]
        tags:
            - "v*"

jobs:
    changes:
        name: Detect changed file groups
        runs-on: ubuntu-latest
        outputs:
            python_changed: ${{ steps.filter.outputs.python }}
            docs_changed: ${{ steps.filter.outputs.docs }}
            markdown_links_changed: ${{ steps.filter.outputs.markdown_links }}
            precommit_changed: ${{ steps.filter.outputs.precommit }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      python:
                        - 'src/**'
                        - 'tests/**'
                        - 'tools/**'
                        - '.github/actions/setup-python-nox/**'
                        - 'pyproject.toml'
                        - 'noxfile.py'
                        - 'requirements*.txt'
                        - 'constraints*.txt'
                      docs:
                        - 'docs/**'
                        - 'src/**'
                        - 'tools/docs/**'
                        - '.github/actions/setup-python-nox/**'
                        - 'mkdocs.yml'
                        - 'mkdocs.linkcheck.yml'
                        - 'pyproject.toml'
                        - 'noxfile.py'
                        - 'requirements*.txt'
                        - 'constraints*.txt'
                      markdown_links:
                        - 'docs/**'
                        - 'tools/docs/**'
                        - 'README.md'
                        - 'INSTALL.md'
                        - 'CONTRIBUTING.md'
                        - 'lychee.toml'
                      precommit:
                        - 'src/**'
                        - 'tests/**'
                        - 'tools/**'
                        - 'docs/**'
                        - '.github/workflows/**'
                        - '.github/actions/**'
                        - '.pre-commit-config.yaml'
                        - '.bake.toml'
                        - 'Makefile'
                        - 'mkdocs.yml'
                        - 'mkdocs.linkcheck.yml'
                        - 'pyproject.toml'
                        - 'noxfile.py'
                        - 'requirements*.txt'
                        - 'constraints*.txt'
                        - 'README.md'
                        - 'INSTALL.md'
                        - 'CONTRIBUTING.md'

            - run: echo "python_changed=${{ steps.filter.outputs.python }}"
            - run: echo "docs_changed=${{ steps.filter.outputs.docs }}"
            - run: echo "markdown_links_changed=${{ steps.filter.outputs.markdown_links }}"
            - run: echo "precommit_changed=${{ steps.filter.outputs.precommit }}"

    lint:
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-python-nox
              with:
                  python-version: "3.13"

            - name: Lint & type-check via nox
              run: |
                  nox -s format_check
                  nox -s lint
                  nox -s docstring_links

    pre-commit:
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.precommit_changed == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - id: setup-python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
                  cache: pip
                  cache-dependency-path: |
                      .pre-commit-config.yaml
                      pyproject.toml
                      requirements*.txt
                      constraints*.txt

            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                  key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'pyproject.toml', 'requirements*.txt', 'constraints*.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

            - name: Install pre-commit
              run: |
                  python -m pip install -U pip
                  pip install pre-commit

            - name: Run pre-commit hooks
              env:
                  SKIP: lychee-md,lychee-src,pyright,docstring-ref-links
              run: pre-commit run --all-files --show-diff-on-failure

    docs:
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-python-nox
              with:
                  python-version: "3.13"

            - name: Build docs (strict via nox)
              run: |
                  nox -s docs

    tests:
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.python_changed == 'true' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v4

            - id: setup-python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  allow-prereleases: true
                  cache: pip
                  cache-dependency-path: |
                      pyproject.toml
                      noxfile.py
                      requirements*.txt
                      constraints*.txt

            - name: Cache pip & nox
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/pip
                      ~/.cache/uv
                  key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'noxfile.py', 'requirements*.txt', 'constraints*.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

            - name: Bootstrap nox
              run: |
                  python -m pip install -U pip
                  pip install nox nox-uv uv

            - name: Run nox QA for ${{ matrix.python-version }}
              run: |
                  nox -s qa -p ${{ matrix.python-version }}

    api-snapshot:
        name: API Snapshot
        needs: changes
        if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.python_changed == 'true' }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-python-nox
              with:
                  python-version: "3.13"

            - name: Run API snapshot check (py313)
              run: |
                  nox -s api_snapshot -p 3.13

    links:
        # Use official lychee Action; no cargo needed
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.markdown_links_changed == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check links in docs and selected top-level Markdown
              uses: lycheeverse/lychee-action@v1
              with:
                  args: >-
                      --config lychee.toml
                      --no-progress
                      --quiet
                      docs
                      README.md
                      INSTALL.md
                      CONTRIBUTING.md

    links-site:
        needs: changes
        if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs_changed == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-python-nox
              with:
                  python-version: "3.13"

            - name: Install docs requirements
              run: |
                  python -m pip install -U pip
                  pip install -r requirements-docs.txt

            - name: Build docs (linkcheck config)
              run: |
                  mkdocs build -f mkdocs.linkcheck.yml --strict

            - name: Check links in built site
              uses: lycheeverse/lychee-action@v1
              with:
                  args: >-
                      --config lychee.toml
                      --no-progress
                      --quiet
                      --root-dir ${{ github.workspace }}/site
                      site
