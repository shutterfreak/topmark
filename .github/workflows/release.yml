name: Release to PyPI

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]

permissions:
  contents: read
  id-token: write # REQUIRED for PyPI/TestPyPI Trusted Publishing (OIDC)

concurrency:
  group: pypi-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.set.outputs.should_release }}
      tag: ${{ steps.set.outputs.tag }}
      tag_no_v: ${{ steps.set.outputs.tag_no_v }}
      version_pep440: ${{ steps.set.outputs.version_pep440 }}
      version_semver: ${{ steps.set.outputs.version_semver }}
      is_prerelease: ${{ steps.set.outputs.is_prerelease }}
      channel: ${{ steps.set.outputs.channel }} # pypi | testpypi
      release_name: ${{ steps.set.outputs.release_name }} # e.g. v1.2.3, v1.2.3rc1, or v1.2.3-rc1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Install packaging
        run: uv pip install --system packaging

      - id: set
        name: Determine whether this CI run should publish
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            echo "Unsupported trigger: ${{ github.event_name }}"
            exit 1
          fi

          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "CI did not succeed; skipping release workflow."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHA="${{ github.event.workflow_run.head_sha }}"
          git fetch --tags --force --prune
          # Keep the tag-printing debug log for troubleshooting
          echo "Tags pointing at $SHA:"
          git tag --points-at "$SHA" || true
          RAW="$(git tag --points-at "$SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+((rc|a|b)[0-9]+|-(rc|a|b)[0-9]+)?$' | head -n1 || true)"

          if [[ -z "$RAW" ]]; then
            echo "No release tag found for $SHA; skipping publish."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="$RAW"
          TAG_NO_V="${RAW#v}"

          # Normalize release tag to a PEP 440 version while retaining a dash form
          # for compatibility with existing workflow outputs.
          PEP440=$(TAG_NO_V="$TAG_NO_V" python - <<-'PY'
          from os import environ
          from packaging.version import Version

          print(Version(environ["TAG_NO_V"]))
          PY
          )

          # SemVer-like representation (keeps dash form if provided on the tag)
          SEMVER="$TAG_NO_V"

          # Pre-release detection -> choose TestPyPI vs PyPI
          if TAG_NO_V="$TAG_NO_V" python - <<-'PY'
          from os import environ
          from packaging.version import Version
          from sys import exit

          exit(0 if Version(environ["TAG_NO_V"]).is_prerelease else 1)
          PY
          then
            IS_PRERELEASE=true
            CHANNEL=testpypi
          else
            IS_PRERELEASE=false
            CHANNEL=pypi
          fi

          echo "Resolved release tag: $TAG"
          echo "Release channel: $CHANNEL"

          {
            echo "should_release=true"
            echo "tag=$TAG"
            echo "tag_no_v=$TAG_NO_V"
            echo "version_pep440=$PEP440"
            echo "version_semver=$SEMVER"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "channel=$CHANNEL"
            echo "release_name=$TAG"
          } >> "$GITHUB_OUTPUT"

  details:
    name: Validate release metadata
    needs: [ preflight ]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.preflight.outputs.tag }}
      tag_no_v: ${{ needs.preflight.outputs.tag_no_v }}
      version_pep440: ${{ needs.preflight.outputs.version_pep440 }}
      version_semver: ${{ needs.preflight.outputs.version_semver }}
      is_prerelease: ${{ needs.preflight.outputs.is_prerelease }}
      channel: ${{ needs.preflight.outputs.channel }}
      release_name: ${{ needs.preflight.outputs.release_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Build artifacts for version validation
        run: |
          uv build --out-dir dist-check

      - id: check-version
        name: Ensure SCM-derived build version matches tag (PEP 440)
        shell: bash
        env:
          WANT: ${{ needs.preflight.outputs.version_pep440 }}
        run: |
          set -euo pipefail
          python <<-'PY'
          import email
          import os
          import pathlib
          import tarfile
          import zipfile

          want = os.environ["WANT"]
          dist_dir = pathlib.Path("dist-check")

          wheels = list(dist_dir.glob("*.whl"))
          sdists = list(dist_dir.glob("*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(
                  f"Expected exactly one wheel and one sdist in dist-check, got {len(wheels)} wheel(s) and {len(sdists)} sdist(s)"
              )

          with zipfile.ZipFile(wheels[0]) as wheel_zip:
              metadata_name = next(
                  name for name in wheel_zip.namelist() if name.endswith(".dist-info/METADATA")
              )
              wheel_meta = email.message_from_bytes(wheel_zip.read(metadata_name))
              wheel_version = wheel_meta["Version"]

          with tarfile.open(sdists[0], "r:gz") as sdist_tar:
              pkg_info_member = next(
                  member for member in sdist_tar.getmembers() if member.name.endswith("/PKG-INFO")
              )
              pkg_info_file = sdist_tar.extractfile(pkg_info_member)
              if pkg_info_file is None:
                  raise SystemExit("Could not read PKG-INFO from sdist")
              sdist_meta = email.message_from_bytes(pkg_info_file.read())
              sdist_version = sdist_meta["Version"]

          print(f"wheel version : {wheel_version}")
          print(f"sdist version : {sdist_version}")
          print(f"tag version   : {want}")

          if wheel_version != want or sdist_version != want:
              raise SystemExit("SCM-derived artifact version does not match release tag")
          PY

  build-docs:
    name: Build docs (strict)
    needs: [ preflight, details ]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Build docs (strict via nox)
        run: |
          nox -s docs

  links-site:
    name: Check links (built site)
    needs: [ preflight, details ]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Install docs requirements
        run: |
          uv pip install --system -e .[docs]

      - name: Build docs (linkcheck config)
        run: |
          mkdocs build -f mkdocs.linkcheck.yml --strict

      - name: Check links in built site
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --config lychee.toml --no-progress --quiet --root-dir ${{
            github.workspace }}/site site

  publish-package:
    name: Publish to PyPI/TestPyPI
    needs: [ preflight, details, build-docs, links-site ]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.details.outputs.channel }} # 'testpypi' for rc/a/b, else 'pypi'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-python-nox
        with:
          python-version: "3.13"

      - name: Ensure version not already exists on target index
        shell: bash
        run: |
          set -euo pipefail
          PKG="topmark"
          VER_PEP440="${{ needs.details.outputs.version_pep440 }}"
          CHANNEL="${{ needs.details.outputs.channel }}" # 'testpypi' or 'pypi'
          BASE_URL=$([ "$CHANNEL" = "testpypi" ] && echo "https://test.pypi.org/pypi" || echo "https://pypi.org/pypi")
          URL="${BASE_URL}/${PKG}/json"
          echo "Checking ${PKG}==${VER_PEP440} on ${CHANNEL} ..."
          if curl -fsS "$URL" -o /tmp/index.json; then
            if VER_PEP440="$VER_PEP440" python -c 'import json, os, sys; d=json.load(open("/tmp/index.json")); sys.exit(0 if os.environ.get("VER_PEP440") not in d.get("releases", {}) else 99)'; then
              echo "✅ ${PKG}==${VER_PEP440} not found on ${CHANNEL} — OK to publish."
            else
              echo "❌ ${PKG}==${VER_PEP440} already exists on ${CHANNEL}."
              echo "   Bump the version or delete the tag before retrying."
              exit 1
            fi
          else
            echo "ℹ️ Package not found on ${CHANNEL} yet — first publish will create it."
          fi

      - name: Build sdist and wheel
        run: |
          uv build

      - name: Verify build artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -l dist || true
          SDISTS=(dist/*.tar.gz)
          WHEELS=(dist/*.whl)

          [[ -e "${SDISTS[0]}" ]] || { echo "❌ No sdist (.tar.gz) found in dist/"; exit 1; }
          [[ -e "${WHEELS[0]}" ]] || { echo "❌ No wheel (.whl) found in dist/"; exit 1; }

          if [[ ${#SDISTS[@]} -ne 1 ]]; then
            echo "❌ Expected exactly 1 sdist, found ${#SDISTS[@]}:"
            printf ' - %s\n' "${SDISTS[@]}"
            exit 1
          fi

          echo "✅ Found sdist:  ${SDISTS[0]}"
          echo "✅ Found wheel(s):"
          printf ' - %s\n' "${WHEELS[@]}"

          if ls dist/*py3-none-any.whl >/dev/null 2>&1; then
            echo "ℹ️ Detected universal pure-Python wheel (py3-none-any)."
          fi

      - name: Verify filenames embed the right version
        shell: bash
        run: |
          set -euo pipefail
          VER_PEP440="${{ needs.details.outputs.version_pep440 }}"
          echo "Expecting version in filenames: ${VER_PEP440}"
          test -e "dist/topmark-${VER_PEP440}.tar.gz" \
            || { echo "❌ Missing sdist dist/topmark-${VER_PEP440}.tar.gz"; ls -l dist; exit 1; }
          ls "dist/topmark-${VER_PEP440}-"*.whl >/dev/null 2>&1 \
            || { echo "❌ Missing wheel dist/topmark-${VER_PEP440}-*.whl"; ls -l dist; exit 1; }

      - name: Install packaging
        run: uv pip install --system packaging

      - name: Ensure new final release is newer than PyPI latest
        if: ${{ needs.details.outputs.is_prerelease != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PKG="topmark"
          NEW_VERSION="${{ needs.details.outputs.version_pep440 }}"
          URL="https://pypi.org/pypi/${PKG}/json"
          echo "Comparing ${NEW_VERSION} against latest final on PyPI…"
          if ! curl -fsS "$URL" -o /tmp/pypi.json; then
            echo "ℹ️ ${PKG} not found on PyPI yet — OK to publish ${NEW_VERSION}."
            exit 0
          fi
          # PEP440-aware comparison
          if NEW_VERSION="$NEW_VERSION" python -c 'import json, sys, os; from packaging.version import Version; data = json.load(open("/tmp/pypi.json")); new = Version(os.environ["NEW_VERSION"]); finals = [Version(v) for v, f in (data.get("releases") or {}).items() if not Version(v).is_prerelease and any(not x.get("yanked", False) for x in (f or []))]; sys.exit(0 if not finals or new > max(finals) else 99)'; then
            echo "✅ ${NEW_VERSION} is newer than the latest final on PyPI — OK to publish."
          else
            echo "❌ ${NEW_VERSION} is NOT newer than the latest final on PyPI."
            echo "   Bump the version or retag before retrying."
            exit 1
          fi

      - name: Publish to TestPyPI (Trusted Publishing)
        if: ${{ needs.details.outputs.is_prerelease == 'true' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          skip-existing: true

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ needs.details.outputs.is_prerelease != 'true' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          # (intentionally no repository-url here → real PyPI)
          # (optionally omit skip-existing to fail on reuse; or set skip-existing: true if you prefer idempotency)

  github-release:
    needs: [ preflight, details, publish-package ]
    if: ${{ needs.preflight.outputs.should_release == 'true' &&
      needs.details.outputs.is_prerelease != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.details.outputs.tag }}
          name: Release ${{ needs.details.outputs.release_name }}
          generate_release_notes: true
