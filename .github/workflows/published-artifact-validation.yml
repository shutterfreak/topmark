name: Published Artifact Validation

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: "TopMark version to install, e.g. 1.0.0b2"
        required: true
      index:
        description: "Package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  install-smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / ${{ inputs.index }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show Python and pip versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip --version

      - name: Upgrade pip
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

      - name: Install TopMark from TestPyPI
        if: ${{ inputs.index == 'testpypi' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "topmark==${{ inputs.version }}"

      - name: Install TopMark from PyPI
        if: ${{ inputs.index == 'pypi' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "topmark==${{ inputs.version }}"

      - name: Verify installed distribution
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from importlib.metadata import version

          installed = version("topmark")
          expected = "${{ inputs.version }}"
          print(f"installed topmark: {installed}")
          if installed != expected:
              raise SystemExit(f"Expected topmark=={expected}, got {installed}")
          PY

      - name: Create smoke-test workspace
        shell: bash
        run: |
          set -euo pipefail
          mkdir smoke-workspace
          cat > smoke-workspace/README.md <<'EOF'
          # Smoke workspace

          This file is used by the install-smoke workflow.
          EOF

      - name: Run CLI smoke tests
        shell: bash
        working-directory: smoke-workspace
        run: |
          set -euo pipefail
          topmark version
          topmark config defaults
          topmark registry filetypes
          topmark probe README.md
          topmark check . --no-color

      - name: Run API smoke test
        shell: bash
        working-directory: smoke-workspace
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          from topmark.api import probe

          result = probe([Path("README.md")])
          print(result)
          if not result.files:
              raise SystemExit("Expected at least one probe result")
          PY
