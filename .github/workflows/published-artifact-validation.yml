name: Published Artifact Validation

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: "TopMark version to install, e.g. 1.0.0b2, 1.0.0rc1, 1.0.0"
        required: true
      index:
        description: "Package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      platform:
        description: "Platform matrix subset"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ubuntu-latest
          - macos-latest
          - windows-latest
      python-version:
        description: "Python version matrix subset"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
      log-level:
        description: "Optional TopMark runtime log level"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - TRACE
          - DEBUG
          - INFO
          - WARNING
          - ERROR

jobs:
  published-artifact-validation:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / ${{ inputs.index }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      TOPMARK_LOG_LEVEL: ${{ inputs.log-level == 'none' && '' || inputs.log-level }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.platform == 'all' && '["ubuntu-latest", "macos-latest", "windows-latest"]' || format('["{0}"]', inputs.platform)) }}
        python-version: ${{ fromJSON(inputs.python-version == 'all' && '["3.10", "3.11", "3.12", "3.13", "3.14"]' || format('["{0}"]', inputs.python-version)) }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show Python and pip versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip --version

      - name: Upgrade pip
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

      - name: Install TopMark from TestPyPI
        if: ${{ inputs.index == 'testpypi' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "topmark==${{ inputs.version }}"

      - name: Install TopMark from PyPI
        if: ${{ inputs.index == 'pypi' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "topmark==${{ inputs.version }}"

      - name: Verify installed distribution
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from importlib.metadata import version

          installed = version("topmark")
          expected = "${{ inputs.version }}"
          print(f"installed topmark: {installed}")
          if installed != expected:
              raise SystemExit(f"Expected topmark=={expected}, got {installed}")
          PY

      - name: Create validation workspace
        shell: bash
        run: |
          set -euo pipefail
          mkdir validation-workspace
          printf '# Validation workspace\n\nThis file is used by the published artifact validation workflow.\n' > validation-workspace/README.md

      - name: Validate read-only CLI commands
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          topmark version
          topmark config defaults
          topmark registry filetypes
          topmark probe README.md

      - name: Inspect validation workspace on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          print(f"path: {path}")
          print(f"resolved: {path.resolve()}")
          print(f"exists: {path.exists()}")
          print(f"is_file: {path.is_file()}")
          print(f"size: {path.stat().st_size if path.exists() else '<missing>'}")
          print("content repr:")
          print(repr(path.read_text(encoding="utf-8")))
          PY

      - name: Inspect check machine output on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          topmark check README.md --output-format json --no-color || true
          topmark check README.md --output-format ndjson --no-color || true

      - name: Validate check apply
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          topmark check --apply README.md --no-color

      - name: Validate check idempotence
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          topmark check README.md --no-color

      - name: Validate strip apply
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          cp README.md STRIPME.md
          topmark strip --apply STRIPME.md --no-color

      - name: Validate strip idempotence
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          topmark strip STRIPME.md --no-color

      - name: Run API validation check
        shell: bash
        working-directory: validation-workspace
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          from topmark.api import probe

          result = probe([Path("README.md")])
          print(result)
          if not result.files:
              raise SystemExit("Expected at least one probe result")
          PY
