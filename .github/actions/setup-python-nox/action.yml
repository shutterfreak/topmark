name: Setup Python + nox

description: >-
  Shared bootstrap for GitHub Actions jobs that need Python, uv caching, and the nox toolchain.

inputs:
  python-version:
    description: >-
      Python version to install. Workflows should pass the resolved canonical Python version when
      running project checks, or an explicit bootstrap version when resolving metadata.
    required: false
    default: "3.x"

runs:
  using: composite
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.11.x"
        python-version: ${{ inputs.python-version }}
        enable-cache: false

    - name: Cache uv
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.python-version', 'pyproject.toml', 'uv.lock', 'noxfile.py') }}
        restore-keys: |
          ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

    - name: Bootstrap nox
      shell: bash
      run: |
        set -euo pipefail
        uv pip install --system nox nox-uv
