name: Setup Python + nox

description: >-
  Shared bootstrap for GitHub Actions jobs that need Python, uv caching,
  and the nox toolchain.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
      with:
        version: "0.10.x"

    - name: Cache uv
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'noxfile.py', 'requirements*.txt', 'constraints*.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

    - name: Bootstrap nox
      shell: bash
      run: |
        set -euo pipefail
        uv pip install --system nox nox-uv
