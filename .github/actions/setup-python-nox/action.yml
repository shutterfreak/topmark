name: Setup Python + nox

description: >-
  Shared bootstrap for GitHub Actions jobs that need Python, pip/uv caches,
  and the nox toolchain.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"
  cache-dependency-path:
    description: >-
      Newline-separated dependency files used to compute the pip cache key.
    required: false
    default: |
      requirements-*.txt
      constraints.txt
      pyproject.toml
      noxfile.py

runs:
  using: composite
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Cache pip and uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.cache/uv
        key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles(inputs.cache-dependency-path) }}
        restore-keys: |
          ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

    - name: Bootstrap nox
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install -U pip
        python -m pip install nox nox-uv uv
