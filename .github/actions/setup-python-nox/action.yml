name: Setup Python + nox

description: >-
  Shared bootstrap for GitHub Actions jobs that need Python, uv caching, and the nox toolchain.

inputs:
  python-version:
    description: >-
      Python version to install. Workflows should pass the resolved canonical Python version when
      running project checks, or an explicit bootstrap version when resolving metadata.
    required: false
    default: "3.x"

runs:
  using: composite
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.10.x"

    - name: Cache uv
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'noxfile.py') }}
        restore-keys: |
          ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

    - name: Bootstrap nox
      shell: bash
      run: |
        set -euo pipefail
        uv pip install --system nox nox-uv
