name: Setup Python + nox

description: >-
  Shared bootstrap for GitHub Actions jobs that need Python, pip/uv caches,
  and the nox toolchain.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          noxfile.py
          requirements*.txt
          constraints*.txt

    - name: Cache pip and uv
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/pip
          ~/.cache/uv
        key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml', 'noxfile.py', 'requirements*.txt', 'constraints*.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

    - name: Bootstrap nox
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install -U pip
        python -m pip install nox nox-uv uv
