# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    # Install uv, then install the project with docs extras into the RTD build environment.
    - python -m pip install uv
    - uv pip install --system -e .[docs]
    # Tell MkDocs to output the built site to the correct Read the Docs directory.
    - mkdocs build --site-dir $READTHEDOCS_OUTPUT/html
